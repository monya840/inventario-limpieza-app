<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Inventario de limpieza</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; }
.top-bar { background: #c0392b; color: #fff; padding: 14px 16px 12px; }
.top-bar .title { font-size: 20px; font-weight: 500; margin-bottom: 2px; }
.top-bar .apt { font-size: 15px; opacity: 0.9; margin-bottom: 8px; }
.prog-bar { height: 3px; background: rgba(255,255,255,0.3); border-radius: 2px; }
.prog-fill { height: 3px; background: #fff; border-radius: 2px; transition: width 0.3s; }
.body { padding: 12px; }
.config-panel { background: #fff; border-radius: 12px; border: 1px solid #e8e8e4; padding: 14px; margin-bottom: 12px; }
.config-title { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
.config-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.config-row label { font-size: 12px; color: #555; }
.config-row input, .config-row select { padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; width: 100%; }
.config-btn { width: 100%; padding: 10px; background: #c0392b; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px; }
.sec-label { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin: 12px 0 8px; }
.bottles-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
.bottle-card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e4; padding: 10px 8px 8px; display: flex; flex-direction: column; align-items: center; }
.bottle-card.filled { border-color: #3B6D11; }
.bottle-card.warn { border-color: #BA7517; border-width: 1.5px; }
.b-name { font-size: 11px; font-weight: 500; color: #222; text-align: center; margin-bottom: 8px; min-height: 28px; display: flex; align-items: center; line-height: 1.3; }
.b-level { font-size: 11px; font-weight: 500; margin-top: 4px; }
.b-hint { font-size: 10px; color: #888; text-align: center; }
.prod-row { background: #fff; border-radius: 8px; border: 1px solid #e8e8e4; padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
.prod-row.filled { border-color: #3B6D11; }
.prod-info { flex: 1; }
.prod-name { font-size: 13px; font-weight: 500; color: #222; }
.prod-unit { font-size: 11px; color: #888; }
.qty-ctrl { display: flex; align-items: center; gap: 6px; }
.qty-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #ddd; background: #f5f5f0; color: #222; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
.qty-val { font-size: 15px; font-weight: 500; min-width: 24px; text-align: center; color: #888; }
.qty-val.has-val { color: #3B6D11; }
.divider { border: none; border-top: 1px solid #e8e8e4; margin: 12px 0; }
.submit-btn { width: 100%; padding: 14px; background: #c0392b; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; }
.submit-btn:disabled { opacity: 0.35; cursor: default; }
.status-box { border-radius: 8px; padding: 12px 14px; font-size: 13px; margin-top: 10px; text-align: center; }
.status-box.loading { background: #E6F1FB; color: #0C447C; }
.status-box.success { background: #EAF3DE; color: #27500A; }
.status-box.error { background: #FCEBEB; color: #791F1F; }
.hidden { display: none; }
</style>
</head>
<body>
<div class="top-bar">
  <div class="title">Inventario de limpieza</div>
  <div class="apt" id="apt-label">&nbsp;</div>
  <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
</div>
<div class="body">
  <div class="config-panel" id="config-panel">
    <div class="config-title">Configuración</div>
    <div class="config-row">
      <label>API Key de SmartSuite</label>
      <input type="password" id="api-key" placeholder="Pega aquí tu API key" />
    </div>
    <div class="config-row">
      <label>Piso</label>
      <select id="apt-select"><option value="">Selecciona el piso...</option></select>
    </div>
    <button class="config-btn" onclick="loadInventory()">Cargar inventario</button>
    <div class="status-box loading hidden" id="load-status"></div>
  </div>
  <div id="form-body" class="hidden">
    <div class="sec-label">💧 Líquidos — toca el nivel del bote</div>
    <div class="bottles-grid" id="bottles-grid"></div>
    <div class="sec-label">🧹 Utensilios</div>
    <div id="utensilios-list"></div>
    <div class="sec-label">🪣 Herramientas</div>
    <div id="herramientas-list"></div>
    <div class="divider"></div>
    <button class="submit-btn" id="submit-btn" disabled onclick="submitForm()">Enviar recuento</button>
    <div class="status-box hidden" id="submit-status"></div>
  </div>
</div>
<script>
const WORKSPACE_ID = 'sy3n9ee9';
const TABLE_ID     = '6984b83b5db666742c541b70';
const PROXY        = '/api/smartsuite';
const SLUG_APTS    = 's366d5de9a';
const SLUG_UNIDAD  = 's6ff63d021';

const LIQUIDOS = [
  { name: 'Lejia garrafa 5 litros' },
  { name: 'Fregasuelo garrafa 5 litros' },
  { name: 'Desengrasante garrafa 5 litros' },
  { name: 'Vinagre garrafa 5 litros' },
];
const UTENSILIOS = [
  { name: 'Bayetas',             unit: 'uds' },
  { name: 'Estropajos verdes',   unit: 'uds' },
  { name: 'Rollo papel azul',    unit: 'rollos' },
  { name: 'Cajas con guantes - latex', unit: 'cajas' },
];
const HERRAMIENTAS = [
  { name: 'Mocho (sin palo)',             unit: 'uds' },
  { name: 'Cubo fregona',                unit: 'uds' },
  { name: 'Cepillo de escoba (sin palo)', unit: 'uds' },
  { name: 'Palo (scoba, fregona etc...)', unit: 'uds' },
  { name: 'Recogedor (pala + palo)',      unit: 'uds' },
];
const PISOS = [
  'Alegre de Dalt 26 - 2-3','Amigo 25 - 1-2','Arago 109 - 1-1','Arago 109 - PR-2',
  'Aribau 84 - 1','Aribau 153 - 4-1','Av Madrid 106 - 3-2','Balmes 52 - 4-1',
];

const LEVELS  = ['Vacío','¼','½','¾','Lleno'];
const COLORS  = ['#E24B4A','#EF9F27','#EF9F27','#1D9E75','#1D9E75'];
const FILLS   = [0, 0.22, 0.48, 0.72, 0.95];
const LVL_VAL = [0, 0.25, 0.5, 0.75, 1];

let recordMap = {};
let bState = {}, cState = {};
LIQUIDOS.forEach(p => bState[p.name] = null);
[...UTENSILIOS,...HERRAMIENTAS].forEach(p => cState[p.name] = null);
const TOTAL = LIQUIDOS.length + UTENSILIOS.length + HERRAMIENTAS.length;

function apiKey() { return document.getElementById('api-key').value.trim(); }

async function apiCall(path, method='GET', body=null) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey(),
      'x-account-id': WORKSPACE_ID,
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${PROXY}?path=${encodeURIComponent(path)}`, opts);
  if (!res.ok) throw new Error(`Error ${res.status}: ${await res.text()}`);
  return res.json();
}

async function loadInventory() {
  const apt = document.getElementById('apt-select').value;
  if (!apiKey()) { showStatus('load-status', 'Introduce la API key primero', 'error'); return; }
  if (!apt) { showStatus('load-status', 'Selecciona un piso', 'error'); return; }
  showStatus('load-status', 'Cargando inventario...', 'loading');
  try {
    // Una sola llamada filtrando por piso directamente
    const data = await apiCall(`applications/${TABLE_ID}/records/list/`, 'POST', {
      hydrated: true,
      filter: {
        operator: 'and',
        fields: [{
          field: SLUG_APTS,
          comparison: 'is',
          value: [apt]
        }]
      },
      pagination: { limit: 50 }
    });

    recordMap = {};
    if (data.items) {
      data.items.forEach(record => {
        recordMap[record.title] = record.id;
      });
    }

    const found = Object.keys(recordMap).length;
    if (found === 0) {
      showStatus('load-status', `No se encontraron registros para "${apt}"`, 'error');
      return;
    }

    document.getElementById('apt-label').textContent = apt;
    document.getElementById('config-panel').classList.add('hidden');
    document.getElementById('form-body').classList.remove('hidden');
    renderAll();
  } catch(e) {
    showStatus('load-status', 'Error: ' + e.message, 'error');
  }
}

async function submitForm() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  showStatus('submit-status', 'Guardando...', 'loading');
  let errors = 0;
  let notFound = [];
  const all = [
    ...LIQUIDOS.map(p => ({ name: p.name, value: LVL_VAL[bState[p.name]] })),
    ...[...UTENSILIOS,...HERRAMIENTAS].map(p => ({ name: p.name, value: cState[p.name] }))
  ];
  for (const item of all) {
    const id = recordMap[item.name];
    if (!id) { notFound.push(item.name); continue; }
    try {
      await apiCall(`applications/${TABLE_ID}/records/${id}/`, 'PATCH', {
        [SLUG_UNIDAD]: item.value
      });
    } catch(e) { errors++; }
  }
  if (errors === 0 && notFound.length === 0) {
    showStatus('submit-status', '✓ Recuento guardado correctamente', 'success');
  } else if (notFound.length > 0) {
    showStatus('submit-status', `No encontrados: ${notFound.join(', ')}`, 'error');
    btn.disabled = false;
  } else {
    showStatus('submit-status', `${errors} errores al guardar.`, 'error');
    btn.disabled = false;
  }
}

function showStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `status-box ${type}`;
  el.classList.remove('hidden');
}

function updateProgress() {
  const done = Object.values(bState).filter(v=>v!==null).length +
               Object.values(cState).filter(v=>v!==null).length;
  document.getElementById('prog').style.width = Math.round((done/TOTAL)*100)+'%';
  document.getElementById('submit-btn').disabled = done < TOTAL;
}

function makeSVG(name, level) {
  const W=64,H=100,bx=10,bw=44,btop=22,bbot=90,bh=bbot-btop;
  const nW=20,nH=12,nX=bx+(bw-nW)/2,cW=22,cH=7,cX=bx+(bw-cW)/2;
  const fillPct=level!==null?FILLS[level]:0;
  const fillColor=level!==null?COLORS[level]:'transparent';
  const fillH=bh*fillPct,fillY=bbot-fillH;
  const lineY=[0.2,0.4,0.6,0.8].map(p=>Math.round(bbot-bh*p));
  let s=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  if(level!==null&&fillPct>0) s+=`<rect x="${bx+1}" y="${fillY.toFixed(1)}" width="${bw-2}" height="${fillH.toFixed(1)}" fill="${fillColor}" opacity="0.28" rx="2"/>`;
  s+=`<rect x="${nX}" y="${btop-nH}" width="${nW}" height="${nH}" rx="3" fill="none" stroke="#888" stroke-width="1.5"/>`;
  s+=`<rect x="${cX}" y="${btop-nH-cH}" width="${cW}" height="${cH}" rx="2" fill="${level!==null?fillColor:'#ccc'}"/>`;
  s+=`<rect x="${bx}" y="${btop}" width="${bw}" height="${bh}" rx="4" fill="none" stroke="#888" stroke-width="1.5"/>`;
  lineY.forEach((my,mi)=>{
    const active=level!==null&&FILLS[level]>=(mi+1)*0.2-0.05;
    s+=`<line x1="${bx+5}" y1="${my}" x2="${bx+bw-5}" y2="${my}" stroke="${active?fillColor:'#ccc'}" stroke-width="${active?2:1}" stroke-dasharray="5 3"/>`;
  });
  const zones=[{top:lineY[0]+1,bot:bbot,lv:0},{top:lineY[1]+1,bot:lineY[0]-1,lv:1},{top:lineY[2]+1,bot:lineY[1]-1,lv:2},{top:lineY[3]+1,bot:lineY[2]-1,lv:3},{top:btop,bot:lineY[3]-1,lv:4}];
  zones.forEach(z=>{s+=`<rect x="${bx}" y="${z.top}" width="${bw}" height="${Math.max(z.bot-z.top,12)}" fill="transparent" class="tap" data-name="${name}" data-level="${z.lv}" style="cursor:pointer"/>`;});
  const lX=bx+bw+4;
  [[bbot-bh*0.1,'Vacío'],[bbot-bh*0.3,'¼'],[bbot-bh*0.5,'½'],[bbot-bh*0.7,'¾'],[bbot-bh*0.9,'Lleno']].forEach(([y,txt],li)=>{s+=`<text x="${lX}" y="${y+4}" font-size="9" fill="${level===li?COLORS[li]:'#aaa'}" font-weight="${level===li?500:400}">${txt}</text>`;});
  s+='</svg>';
  return s;
}

function attachTaps(container) {
  container.querySelectorAll('.tap').forEach(el=>{
    el.addEventListener('click',function(){
      bState[this.getAttribute('data-name')]=parseInt(this.getAttribute('data-level'));
      renderBottles(); updateProgress();
    });
  });
}

function renderBottles() {
  const grid=document.getElementById('bottles-grid');
  grid.innerHTML='';
  LIQUIDOS.forEach(p=>{
    const lv=bState[p.name];
    const card=document.createElement('div');
    card.className='bottle-card'+(lv!==null&&lv<=1?' warn':lv!==null?' filled':'');
    card.innerHTML=`<div class="b-name">${p.name}</div><div>${makeSVG(p.name,lv)}</div><div class="b-level" style="color:${lv!==null?COLORS[lv]:'#888'}">${lv!==null?LEVELS[lv]:'—'}</div><div class="b-hint">${lv!==null?(lv<=1?'⚠ bajo mínimo':'✓ ok'):'toca el nivel'}</div>`;
    grid.appendChild(card);
  });
  attachTaps(grid);
}

function renderCounters(listId,items) {
  const el=document.getElementById(listId);
  el.innerHTML='';
  items.forEach(p=>{
    const v=cState[p.name];
    const row=document.createElement('div');
    row.className='prod-row'+(v!==null?' filled':'');
    row.innerHTML=`<div class="prod-info"><div class="prod-name">${p.name}</div><div class="prod-unit">${p.unit}</div></div><div class="qty-ctrl"><button class="qty-btn" data-name="${p.name}" data-delta="-1">−</button><span class="qty-val ${v!==null?'has-val':''}">${v!==null?v:'—'}</span><button class="qty-btn" data-name="${p.name}" data-delta="1">+</button></div>`;
    el.appendChild(row);
  });
  el.querySelectorAll('.qty-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      const name=this.getAttribute('data-name');
      const cur=cState[name]!==null?cState[name]:0;
      cState[name]=Math.max(0,cur+parseInt(this.getAttribute('data-delta')));
      renderCounters(listId,items); updateProgress();
    });
  });
}

function renderAll() {
  renderBottles();
  renderCounters('utensilios-list',UTENSILIOS);
  renderCounters('herramientas-list',HERRAMIENTAS);
  updateProgress();
}

const sel=document.getElementById('apt-select');
PISOS.forEach(p=>{const opt=document.createElement('option');opt.value=p;opt.textContent=p;sel.appendChild(opt);});
</script>
</body>
</html>
